# adguard-unbound-dep.conf
# Drop-in systemd pour AdGuardHome : garantit qu'Unbound est démarré
# avant AdGuard et que systemd redémarre AdGuard si Unbound tombe.
#
# Déployer dans : /etc/systemd/system/AdGuardHome.service.d/unbound-dep.conf
# Puis : systemctl daemon-reload && systemctl restart AdGuardHome

[Unit]
Requires=unbound.service
After=unbound.service
