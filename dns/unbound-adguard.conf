server:
    # Interface loopback uniquement (pas d'exposition LAN)
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # User non-root
    username: "unbound"
    directory: "/etc/unbound"
    chroot: ""

    # Caches généreux (homelab)
    msg-cache-size: 64m
    rrset-cache-size: 128m
    infra-cache-numhosts: 50000
    infra-cache-slabs: 4

    # TTL handling
    cache-max-ttl: 86400
    cache-max-negative-ttl: 3600
    cache-min-ttl: 300

    # Comportement chaud + résilience pannes prolongées
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 0
    serve-expired-client-timeout: 1800

    # Privacy (C3)
    qname-minimisation: yes
    qname-minimisation-strict: yes

    # Hardening (C3)
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-referral-path: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    aggressive-nsec: yes
    use-caps-for-id: yes

    # Logs minimal (verbosity 1 = operational)
    verbosity: 1
    log-queries: no
    log-replies: no
    log-servfail: yes

    # Bundle CA pour validation TLS des forwarders DoT
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

forward-zone:
    # Fallback DoT si récursif échoue (Cloudflare retiré)
    name: "."
    forward-first: yes
    forward-tls-upstream: yes
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 194.242.2.2@853#dns.mullvad.net
