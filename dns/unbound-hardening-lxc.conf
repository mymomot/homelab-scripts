# unbound-hardening-lxc.conf
# Drop-in systemd pour Unbound sur LXC non-privilégié.
# Les directives de namespace mount (ProtectSystem, ProtectHome,
# PrivateTmp) sont retirées car incompatibles avec les LXC Proxmox
# non-privilégiés (le kernel n'expose pas ces namespaces).
#
# Déployer dans : /etc/systemd/system/unbound.service.d/hardening.conf
# Puis : systemctl daemon-reload && systemctl restart unbound

[Unit]
StartLimitBurst=3
StartLimitIntervalSec=60

[Service]
# Compatibilité LXC : pas de namespace mount (ProtectSystem/ProtectHome/PrivateTmp retirés)
NoNewPrivileges=yes
LockPersonality=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes
SystemCallArchitectures=native

# AF_NETLINK requis pour getifaddrs() (liste des interfaces)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK

# Privileges minimaux
CapabilityBoundingSet=CAP_SETGID CAP_SETUID

# Restart
Restart=on-failure
RestartSec=3s
