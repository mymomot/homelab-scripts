# unbound-hardening-baremetal.conf
# Drop-in systemd pour Unbound sur bare-metal (Ubuntu 24.04 ou Debian).
# Namespaces mount activés : ProtectSystem=strict, ProtectHome, PrivateTmp.
# Score systemd-analyze security attendu : ~6.5–7.0 (vs LXC ~6.3 sans namespaces).
#
# Déployer dans : /etc/systemd/system/unbound.service.d/hardening.conf
# Puis : systemctl daemon-reload && systemctl restart unbound

[Service]
# Isolation filesystem (bare-metal supporte les namespaces mount)
ProtectSystem=strict
ProtectHome=yes
# RuntimeDirectory crée /run/unbound au démarrage (requis par unbound-helper)
RuntimeDirectory=unbound
ReadWritePaths=/var/lib/unbound
PrivateTmp=yes
ProtectProc=invisible

# Isolation kernel / namespaces
NoNewPrivileges=yes
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=yes
ProtectControlGroups=yes
ProtectClock=yes
ProtectHostname=yes

# Network — AF_NETLINK obligatoire (getifaddrs)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK
IPAddressDeny=
IPAddressAllow=any

# Privileges
CapabilityBoundingSet=CAP_SETGID CAP_SETUID
LockPersonality=yes
MemoryDenyWriteExecute=yes
RestrictNamespaces=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes
SystemCallArchitectures=native

# Restart
Restart=on-failure
RestartSec=3s
StartLimitBurst=3
