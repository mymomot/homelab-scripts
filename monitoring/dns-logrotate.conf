# dns-logrotate.conf
# Configuration logrotate pour les logs DNS (dns-deep-health.sh).
#
# Déployer dans : /etc/logrotate.d/dns-deep-health
# (remplacer motreffs par l'utilisateur effectif si différent)

/home/motreffs/logs/dns-deep-health.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 motreffs motreffs
}
